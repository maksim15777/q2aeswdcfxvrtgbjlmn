name: CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Install dependencies
        run: |
          brew install swiftlint gyb swiftgen

      - name: Generate Swift Files with GYB
        run: |
          chmod +x gyb.sh
          ./gyb.sh 35773088 a22ec995c0cdd77cfbb03ca58bbd1723

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies -project BetterTG.xcodeproj

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project BetterTG.xcodeproj \
            -scheme BetterTG \
            -archivePath build/BetterTG.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER="ph.telegra.TelegraphCopy"

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R build/BetterTG.xcarchive/Products/Applications/BetterTG.app build/Payload/
          cd build
          zip -r Telegram.ipa Payload
          echo "IPA packaged successfully"

      - name: Set Build metadata
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$COMMIT_COUNT" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ env.BUILD_NUMBER }}"
          TITLE="BetterTG (build ${{ env.BUILD_NUMBER }})"
          NOTES="An unsigned build of BetterTG with fake Telegram Stars enabled."

          # Delete existing release/tag if present to avoid conflicts
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            "build/Telegram.ipa#Telegram.ipa"
